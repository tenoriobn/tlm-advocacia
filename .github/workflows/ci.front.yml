name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Instalar dependências
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Instalar Vercel CLI
        run: npm i -g vercel

      - name: Deploy Preview (Vercel)
        id: vercel
        run: |
          vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
          vercel build --token=${{ secrets.VERCEL_TOKEN }}
          vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }} > deploy.txt

          echo "preview_url=$(cat deploy.txt)" >> $GITHUB_OUTPUT

      - name: Comentar Preview no PR
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          recreate: true
          message: |
            🚀 **Preview Deployment**

            🔗 ${{ steps.vercel.outputs.preview_url }}
